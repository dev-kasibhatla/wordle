name: Publish to Harbor

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REGISTRY_PREFIX="$HARBOR_REGISTRY/$HARBOR_PROJECT/wordle"

          echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" \
            --username "$HARBOR_USERNAME" \
            --password-stdin

          docker buildx build \
            --push \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="$VERSION" \
            --build-arg VCS_REF="$SHORT_SHA" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --tag "$REGISTRY_PREFIX:$VERSION" \
            --tag "$REGISTRY_PREFIX:latest" \
            --tag "$REGISTRY_PREFIX:sha-$SHORT_SHA" \
            --cache-from "type=gha" \
            --cache-to   "type=gha,mode=max" \
            .

          docker logout "$HARBOR_REGISTRY" || true
