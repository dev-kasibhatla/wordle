<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">WORDLE</div>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="play" role="tab" aria-selected="true">Play</button>
        <button class="tab" data-tab="autosolve" role="tab" aria-selected="false">Auto Solve</button>
        <button class="tab" data-tab="analyze" role="tab" aria-selected="false">Puzzle State</button>
      </nav>
    </header>

    <main>
      <!-- ── PLAY TAB ─────────────────────────────────────────── -->
      <section id="tab-play" class="tab-panel active" role="tabpanel">
        <div id="play-board" class="board" aria-label="Wordle game board">
          <!-- 6 rows × 5 tiles, generated by JS -->
        </div>
        <div id="play-toast" class="toast" aria-live="polite"></div>
        <div id="play-keyboard" class="keyboard" aria-label="On-screen keyboard">
          <!-- generated by JS -->
        </div>
        <div id="play-actions" class="actions">
          <button id="play-enter" class="btn-primary">Enter</button>
          <div class="action-menu">
            <button id="play-menu" class="btn-menu" aria-label="More options">⋮</button>
            <div id="play-menu-dropdown" class="menu-dropdown">
              <button class="menu-item" data-action="new-game">New Game</button>
            </div>
          </div>
          <button id="play-share" class="btn-ghost" style="display:none">Share</button>
        </div>
      </section>

      <!-- ── AUTO SOLVE TAB ────────────────────────────────────── -->
      <section id="tab-autosolve" class="tab-panel" role="tabpanel">
        <div class="solver-form card">
          <label class="field-label" for="as-secret">Secret word</label>
          <input id="as-secret" class="word-input" maxlength="5" placeholder="crane" autocomplete="off" spellcheck="false" />
          <div class="mode-row">
            <label class="field-label">Solver mode</label>
            <div class="toggle-group">
              <button class="toggle active" data-mode="a">Mode A<span class="mode-hint">Investigate + Hail-Mary</span></button>
              <button class="toggle" data-mode="b">Mode B<span class="mode-hint">Hail-Mary only</span></button>
              <button class="toggle" data-mode="c">Mode C<span class="mode-hint">Entropy-optimal (~3.43 avg)</span></button>
            </div>
          </div>
          <button id="as-run" class="btn-primary full">Solve</button>
        </div>
        <div id="as-result" class="solver-result" style="display:none">
          <div id="as-board" class="board board-sm"></div>
          <div id="as-summary" class="summary-card"></div>
        </div>
        <div id="as-toast" class="toast" aria-live="polite"></div>
      </section>

      <!-- ── PUZZLE STATE TAB ──────────────────────────────────── -->
      <section id="tab-analyze" class="tab-panel" role="tabpanel">
        <div class="analyze-form card">
          <p class="hint-text">Enter your previous guesses and their scores. Click each tile to cycle: grey (0) → yellow (1) → green (2).</p>
          <div id="az-rows" class="az-rows">
            <!-- one editable row starts here, JS adds more -->
          </div>
          <button id="az-add-row" class="btn-ghost sm">+ Add guess</button>
          <div class="mode-row">
            <label class="field-label">Solver mode</label>
            <div class="toggle-group" id="az-mode-group">
              <button class="toggle active" data-mode="a">Mode A</button>
              <button class="toggle" data-mode="b">Mode B</button>
              <button class="toggle" data-mode="c">Mode C</button>
            </div>
          </div>
          <label class="field-label" for="az-secret">Secret (optional, for auto-finish)</label>
          <input id="az-secret" class="word-input" maxlength="5" placeholder="leave blank to just analyze" autocomplete="off" spellcheck="false" />
          <button id="az-analyze" class="btn-primary full">Analyze</button>
        </div>
        <div id="az-result" class="analyze-result" style="display:none">
          <div id="az-summary" class="summary-card"></div>
          <div id="az-finish-board" class="board board-sm" style="display:none"></div>
        </div>
        <div id="az-toast" class="toast" aria-live="polite"></div>
      </section>
    </main>
    <footer class="site-footer" data-site-footer></footer>
    <div class="attribution">Built by <a href="https://kasibhatla.dev" target="_blank" rel="noreferrer">kasibhatla.dev</a></div>
  </div>

  <script type="module" src="/assets/site.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
